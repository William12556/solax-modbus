# oMLX inference endpoint
omlx:
  base_url: "http://127.0.0.1:8000/v1"
  api_key: "local"
  default_model: "mistralai_Devstral-Small-2-24B-Instruct-2512-MLX-8Bit"

# MCP server definitions
# F4: filesystem MCP is confined to the project root for scope containment.
# Each downstream project sets its own allowed_dirs in its local config.yaml.
mcp_servers:
  filesystem:
    command: "/usr/local/bin/npx"
    args:
      - "-y"
      - "@j0hanz/filesystem-mcp@latest"
      - "/Users/williamwatson/Documents/GitHub/solax-modbus"
    env:
      PATH: "/opt/homebrew/opt/node@24/bin:/usr/local/bin:/usr/bin:/bin"

  mcp-grep:
    command: "/Users/williamwatson/mcp-grep-env/bin/python"
    args:
      - "-m"
      - "mcp_grep.server"

# Inference endpoint readiness
readiness:
  timeout_seconds: 60
  poll_interval_seconds: 2

# Loop control
loop:
  max_iterations: 50        # Ralph Loop outer iterations (work+review cycles)
  phase_max_iterations: 50  # Inner tool-call iterations per phase
  mcp_error_threshold: 3    # Write RALPH-BLOCKED.md after this many consecutive MCP errors per phase
  max_tool_calls_per_iteration: 10  # Truncate tool calls per iteration beyond this count
  preflight_check: false             # Evaluate success criteria before first worker iteration
  phase_duration_minutes: 30         # F28: soft cap on a single phase's wall-clock cost during audit-run refinement
  state_dir: "ai/state/ralph"

# Context budget
# context_window: null resolves from model config.json on disk.
# Set explicitly to override (e.g. when model is remote and not stored locally).
# F18: model_context_windows allows per-model overrides (absent falls back to detected value).
context:
  models_dir: "/Users/williamwatson/ai-models"
  context_window: null      # tokens; null = read from model config.json
  budget_warn_pct: 0.80     # print warning at this fraction of context window
  budget_abort_pct: 0.95    # abort phase at this fraction
  # Per-model context window overrides (optional)
  model_context_windows:
    "North-Mini-Code-1.0-6bit": 262144
    "mistralai_Devstral-Small-2-24B-Instruct-2512-MLX-8Bit": 262144  # vendor-recommended (model card + vLLM --max-model-len); oMLX reports 393216 (RoPE-scaling ceiling, unvalidated)
